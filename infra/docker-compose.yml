services:
  postgres:
    image: postgres:16
    container_name: jmp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jmp}
      POSTGRES_USER: ${POSTGRES_USER:-jmp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jmp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - jmp_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: jmp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - jmp_minio_data:/data

volumes:
  jmp_postgres_data:
  jmp_minio_data:

